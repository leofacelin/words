<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少儿英语单词宝</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="top-bar">
                <select id="unitSelect" onchange="changeUnit()"></select>
                <select id="voiceSelect"></select>
            </div>
        </header>

        <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>

        <div id="game-area" class="card"></div>

        <div class="controls">
            <button class="mode-btn active" onclick="switchMode('learn', this)">📖 记忆</button>
            <button class="mode-btn" onclick="switchMode('spell', this)">✍️ 拼写</button>
            <button class="mode-btn" onclick="switchMode('quiz', this)">🧩 填空</button>
        </div>

        <div class="navigation">
            <button id="prevBtn" onclick="changeCard(-1)">⬅️ 上一个</button>
            <button id="nextBtn" onclick="changeCard(1)">下一个 ➡️</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="data/data.js"></script>
    <script src="script.js"></script>
</body>
</html>
